<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTO Appointments | Admin System</title>
    <link rel="icon" type="image/png" href="assets/image/logo-5.png">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .sidebar-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        #sidebar {
            background-color: #00A36C; 
            color: #1e293b; 
            z-index: 50;
        }

        /* Standard Collapse Logic */
        .collapsed { width: 85px !important; }
        .main-expanded { margin-left: 85px !important; }

        /* Nav Item Base */
        .nav-item {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            padding: 0.8rem 1.5rem !important;
            border-radius: 12px !important;
            transition: all 0.2s ease;
            margin: 0.5rem 1rem;
            color: #334155; 
            font-weight: 600;
            text-decoration: none !important;
        }

        .active-nav {
            background-color: white !important;
            color: #00A36C !important;
            font-weight: 800;
        }

        /* --- COLLAPSED FIX (SCREENSHOT 567 STYLE) --- */
        .collapsed nav { padding-left: 0 !important; padding-right: 0 !important; }
        
        .collapsed .nav-item {
            margin: 10px 0 10px 15px !important; 
            width: 70px !important; 
            height: 55px !important;
            padding: 0 !important;
            justify-content: center !important;
            border-radius: 20px 0 0 20px !important; 
            transform: none !important;
        }

        .collapsed .active-nav {
            background-color: white !important;
            color: #00A36C !important;
            width: 70px !important; 
            margin-left: 15px !important; 
            box-shadow: none !important;
        }

        .collapsed .nav-item i { font-size: 1.5rem !important; margin: 0 !important; }

        .collapsed .link-text, .collapsed .brand-name, .collapsed .admin-only p {
            display: none !important;
        }

        /* UI Polish */
        .hover-lift { transition: all 0.3s ease; cursor: pointer; }
        .hover-lift:hover { transform: translateY(-8px); box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.1); }

        /* Siguraduhin na ang footer ay laging nasa ilalim */
        .sidebar-footer {
            margin-top: auto; 
        }

        /* Logout Specific Hover */
        .logout-link:hover {
            background-color: #fee2e2 !important; /* light red */
            color: #dc2626 !important; /* dark red */
        }

        /* --- THE FIX PARA SA COLLAPSED DESIGN --- */
        .collapsed .sidebar-footer {
            padding: 10px 0 !important;
            display: flex;
            justify-content: center;
        }

        .collapsed .logout-link {
            /* Kaparehas ng style ng nav-items mo sa clients */
            margin: 8px 0 8px 15px !important; 
            width: 70px !important; 
            height: 55px !important;
            padding: 0 !important;
            justify-content: center !important;
            border-radius: 20px 0 0 20px !important; 
            background-color: transparent;
        }

        /* Para maging center ang icon sa loob */
        .collapsed .logout-link i {
            font-size: 1.5rem !important;
            margin: 0 !important;
        }
    </style>
</head>
<body class="overflow-x-hidden">

<div class="flex min-h-screen">
    <aside id="sidebar" class="sidebar-transition fixed inset-y-0 left-0 z-50 w-64 shadow-2xl overflow-hidden">
        <div class="flex flex-col h-full">
            <div class="p-6 border-b border-black/5 flex items-center justify-between">
                <button id="sidebarToggle" class="flex items-center gap-3 w-full hover:bg-black/5 p-2 rounded-xl transition-all outline-none">
                    <i class="bi bi-list text-3xl text-slate-800"></i>
                    <span class="brand-name font-black tracking-tighter text-xl uppercase italic whitespace-nowrap text-slate-900">Dasma Admin</span>
                </button>
            </div>

            <nav class="flex-1 px-4 py-6 flex flex-col justify-start overflow-y-auto">
                <div id="navContainer" class="space-y-2">
                    <a href="dashboard.html" class="nav-item">
                        <i class="bi bi-grid-1x2-fill"></i>
                        <span class="link-text text-md">Dashboard</span>
                    </a>
                    <a href="clients.html" class="nav-item">
                        <i class="bi bi-people-fill"></i>
                        <span class="link-text text-md">Violators</span>
                    </a>
                    <a href="violations.html" class="nav-item">
                        <i class="bi bi-exclamation-octagon-fill"></i>
                        <span class="link-text text-md">Violations</span>
                    </a>
                    <a href="master_violations.html" class="nav-item">
                        <i class="bi-car-front-fill"></i>
                        <span class="link-text text-md">City ORD</span>
                    </a>
                    <a href="appointments.html" class="nav-item active-nav">
                        <i class="bi bi-calendar-check-fill"></i>
                        <span class="link-text text-md">Appointments</span>
                    </a>
                    <a href="enforcers.html".html" class="nav-item">
                        <i class="bi bi-shield-lock-fill"></i>
                        <span class="link-text text-md">Enforcers</span>
                    </a>

                    <div class="admin-only pt-4 border-t border-black/10 mt-4">
                        <p class="link-text px-4 text-xs font-bold text-slate-600 uppercase tracking-widest mb-2">System</p>
                        <a href="settings.html" class="nav-item">
                            <i class="bi bi-gear-fill"></i>
                            <span class="link-text text-md">Settings</span>
                        </a>
                    </div>
                </div>
            </nav>

            <div class="p-4 mt-auto border-t border-black/5 sidebar-footer">
                <a href="#" class="nav-item logout-link text-red-600 hover:bg-red-50">
                    <i class="bi bi-box-arrow-right"></i>
                    <span class="link-text uppercase text-xs font-bold">Logout</span>
                </a>
            </div>
        </div>
    </aside>

    <main id="mainContent" class="flex-1 ml-64 sidebar-transition h-screen flex flex-col bg-slate-50 overflow-hidden">
        <header class="bg-white px-8 h-20 flex items-center justify-between border-b border-slate-200 sticky top-0 z-40">
            <div class="flex items-center gap-3">
                <div class="h-8 w-1 bg-blue-600 rounded-full"></div>
                <div>
                    <h2 class="text-xl font-bold text-slate-800 tracking-tight leading-none">Appointments</h2>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Schedule Management</p>
                </div>
            </div>

            <button class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-2xl shadow-lg shadow-blue-200 transition-all flex items-center gap-2 font-black uppercase text-[11px] tracking-wider" 
                    data-bs-toggle="modal" data-bs-target="#addAppointmentModal">
                <i class="bi bi-calendar-plus text-lg"></i> New Schedule
            </button>
        </header>

        <div class="p-8 overflow-y-auto">
            <div class="bg-white rounded-[2rem] shadow-xl shadow-slate-100/50 border border-slate-200 overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50/50 border-b border-slate-200">
                        <tr class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">
                            <th class="px-8 py-5">ID</th>
                            <th class="px-6 py-5">Client Name</th>
                            <th class="px-6 py-5">Date & Time</th>
                            <th class="px-6 py-5">Purpose</th>
                            <th class="px-6 py-5">Status</th>
                            <th class="px-8 py-5 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="appointmentsTableBody" class="divide-y divide-slate-100 text-[13px] font-bold text-slate-600">
                        </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<div class="modal fade" id="addAppointmentModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 rounded-[2rem] overflow-hidden shadow-2xl">
            <div class="bg-blue-600 px-6 py-4 flex justify-between items-center text-white">
                <h5 class="modal-title font-bold flex items-center gap-2 uppercase tracking-tight">
                    <i class="bi bi-calendar-event"></i> New Appointment
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-8">
                <form id="appointmentForm" class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Select Client</label>
                        <select id="clientSelect" class="w-full px-4 py-3 rounded-xl bg-slate-50 border-2 border-slate-100 focus:border-blue-500 outline-none font-bold text-slate-700">
                            <option value="">Loading clients...</option>
                        </select>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Date</label>
                            <input type="date" id="apptDate" class="w-full px-4 py-3 rounded-xl bg-slate-50 border-2 border-slate-100 focus:border-blue-500 outline-none font-bold text-slate-700">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Time</label>
                            <input type="time" id="apptTime" class="w-full px-4 py-3 rounded-xl bg-slate-50 border-2 border-slate-100 focus:border-blue-500 outline-none font-bold text-slate-700">
                        </div>
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Purpose</label>
                        <select id="apptPurpose" class="w-full px-4 py-3 rounded-xl bg-slate-50 border-2 border-slate-100 focus:border-blue-500 outline-none font-bold text-slate-700">
                            <option value="License Renewal">License Renewal</option>
                            <option value="New License Application">New License Application</option>
                            <option value="Vehicle Registration">Vehicle Registration</option>
                            <option value="Clearance/Certification">Clearance/Certification</option>
                        </select>
                    </div>

                    <div class="flex items-center gap-2 px-1">
                        <input type="checkbox" id="sendSmsAppt" class="w-4 h-4 accent-blue-600" checked>
                        <label for="sendSmsAppt" class="text-[11px] font-bold text-slate-500 uppercase">Send SMS Confirmation</label>
                    </div>

                    <button type="button" id="btnConfirmAppt" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-black uppercase tracking-widest shadow-lg shadow-blue-200 transition-all mt-2">
                        Confirm Schedule
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/appointments.js"></script>
</body>
</html>
